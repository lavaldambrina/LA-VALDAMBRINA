<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>LA VALDAMBRINA VINTAGE GAME</title>
    <style>
        body { 
            background-color: #222; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            color: #e67e22; 
            font-family: 'Courier New', Courier, monospace;
        }
        #game-container { 
            position: relative; 
            width: 500px; 
            height: 600px; 
            border: 4px solid #e67e22;
        }
        canvas { 
            display: block; 
            background-color: #2c3e50; 
        }
        #ui { margin-top: 10px; text-align: center; }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="gameCanvas" width="500" height="600"></canvas>
    </div>
    <div id="ui">
        <h2>LA VALDAMBRINA VINTAGE GAME</h2>
        <p>USA LE FRECCE <b>SINISTRA/DESTRA</b> PER GUIDARE | <b>SPAZIO</b> PER LANCIARE</p>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // Configurazione Giocatore
    let player = { x: 235, y: 500, width: 30, height: 50, speed: 7 };
    let keys = {};

    // Gestione Tastiera
    window.addEventListener('keydown', e => keys[e.code] = true);
    window.addEventListener('keyup', e => keys[e.code] = false);

    function update() {
        // Movimento
        if (keys['ArrowLeft'] && player.x > 100) player.x -= player.speed;
        if (keys['ArrowRight'] && player.x < 370) player.x += player.speed;
    }

    function draw() {
        // Pulizia e Sfondo Strada
        ctx.clearRect(0, 0, 500, 600);
        ctx.fillStyle = "#96694c";
        ctx.fillRect(100, 0, 300, 600);
        
        // Disegno Ciclista
        ctx.fillStyle = '#e67e22';
        ctx.fillRect(player.x, player.y, player.width, player.height);
        
        update();
        requestAnimationFrame(draw);
    }

    draw();
</script>
</body>
</html>
