<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wine Delivery: La Valdambrina Editions</title>
    <style>
        body { background-color: #222; color: white; font-family: 'Courier New', Courier, monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; touch-action: none; }
        #game-container { position: relative; width: 500px; height: 600px; }
        canvas { border: 4px solid #e67e22; background-color: #2c3e50; display: block; }
        
        /* Controlli Touch (visibili solo su mobile) */
        .mobile-controls { display: none; width: 500px; gap: 10px; margin-top: 10px; }
        @media (max-width: 600px) {
            .mobile-controls { display: flex; width: 95vw; }
            #game-container { width: 95vw; }
            canvas { width: 95vw; height: auto; }
        }
        .btn-m { flex: 1; padding: 20px; background: #e67e22; border: none; font-weight: bold; color: #222; border-radius: 8px; font-size: 18px; }

        .overlay-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(20, 20, 20, 0.95); border: 4px solid #e67e22; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; box-sizing: border-box; }
        .main-title { color: #e67e22; font-size: 36px; font-weight: bold; margin: 0 0 10px 0; }
        button { padding: 10px 20px; background-color: #e67e22; color: #222; border: none; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="start-screen" class="overlay-screen">
            <p class="main-title">LA VALDAMBRINA</p>
            <input type="text" id="player-name-input" maxlength="12" value="GUEST" style="margin-bottom:15px; padding:10px;">
            <button id="start-btn">INIZIA CONSEGNA</button>
        </div>
        <canvas id="paperboyCanvas" width="500" height="600"></canvas>
    </div>

    <div class="mobile-controls">
        <button class="btn-m" id="btn-left">SINISTRA</button>
        <button class="btn-m" id="btn-shoot">LANCIA</button>
        <button class="btn-m" id="btn-right">DESTRA</button>
    </div>

<script>
const canvas = document.getElementById("paperboyCanvas");
const ctx = canvas.getContext("2d");
let gameActive = false;
let player = { x: 235, y: 500, width: 30, height: 50, speed: 5, score: 0, lives: 3, packages: 10 };
let scrollSpeed = 3, obstacles = [], keys = {};

// Logica Movimento
function moveLeft() { if (gameActive && player.x > 100) player.x -= 15; }
function moveRight() { if (gameActive && player.x < 370) player.x += 15; }

// Input Tastiera
window.addEventListener("keydown", e => {
    keys[e.key] = true;
    if (e.key === " ") shootPackage();
});
window.addEventListener("keyup", e => keys[e.key] = false);

// Input Touch
document.getElementById("btn-left").addEventListener("pointerdown", moveLeft);
document.getElementById("btn-right").addEventListener("pointerdown", moveRight);
document.getElementById("btn-shoot").addEventListener("pointerdown", shootPackage);

function shootPackage() {
    if(!gameActive) return;
    // (Logica lancio originale invariata)
}

function update() {
    if (!gameActive) return;
    if (keys["ArrowLeft"]) moveLeft();
    if (keys["ArrowRight"]) moveRight();
    // ... (restante logica update originale)
}

function draw() {
    ctx.clearRect(0,0,500,600);
    // ... (disegno canvas originale)
    update();
    requestAnimationFrame(draw);
}

document.getElementById("start-btn").addEventListener("click", () => {
    document.getElementById("start-screen").style.display = "none";
    gameActive = true;
    draw();
});
</script>
</body>
</html>
</body>
</html>
