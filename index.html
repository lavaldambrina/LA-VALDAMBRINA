<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; background: #222; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; touch-action: none; }
        #gameCanvas { border: 4px solid #e67e22; background: #2c3e50; width: 95vw; height: 60vh; }
        .btn-container { display: flex; gap: 20px; margin-top: 20px; width: 95vw; }
        button { flex: 1; padding: 25px; font-size: 20px; background: #e67e22; border: none; color: white; font-weight: bold; border-radius: 10px; }
    </style>
</head>
<body>

<canvas id="gameCanvas" width="500" height="600"></canvas>
<div class="btn-container">
    <button id="leftBtn">SINISTRA</button>
    <button id="rightBtn">DESTRA</button>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    // Stato del gioco
    let player = { x: 235, y: 500, width: 30, height: 50 };
    let score = 0;

    function draw() {
        // Pulisci schermo
        ctx.clearRect(0, 0, 500, 600);
        
        // Disegna strada
        ctx.fillStyle = "#96694c";
        ctx.fillRect(100, 0, 300, 600);
        
        // Disegna ciclista
        ctx.fillStyle = '#e67e22';
        ctx.fillRect(player.x, player.y, player.width, player.height);
        
        // Disegna punteggio
        ctx.fillStyle = "white";
        ctx.font = "20px monospace";
        ctx.fillText("SCORE: " + score, 10, 30);
        
        requestAnimationFrame(draw);
    }

    // Controlli moderni (Pointer Events funzionano meglio su Safari)
    document.getElementById('leftBtn').addEventListener('pointerdown', (e) => { 
        e.preventDefault(); 
        if (player.x > 100) player.x -= 20; 
    });
    
    document.getElementById('rightBtn').addEventListener('pointerdown', (e) => { 
        e.preventDefault(); 
        if (player.x < 370) player.x += 20; 
    });

    draw();
</script>
</body>
</html>
