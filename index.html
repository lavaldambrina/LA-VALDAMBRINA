<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; background: #222; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        #gameCanvas { border: 5px solid #e67e22; background: #2c3e50; width: 90vw; height: 60vh; }
        .btn-container { display: flex; gap: 20px; margin-top: 20px; }
        button { padding: 30px; font-size: 24px; background: #e67e22; border: none; color: white; border-radius: 10px; }
    </style>
</head>
<body>

<canvas id="gameCanvas" width="500" height="600"></canvas>
<div class="btn-container">
    <button id="leftBtn">SINISTRA</button>
    <button id="rightBtn">DESTRA</button>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    let x = 235;

    function draw() {
        ctx.clearRect(0, 0, 500, 600);
        ctx.fillStyle = '#e67e22';
        ctx.fillRect(x, 400, 50, 80);
        requestAnimationFrame(draw);
    }

    // Usiamo 'pointerdown' che è il metodo più moderno e compatibile su Safari
    document.getElementById('leftBtn').addEventListener('pointerdown', (e) => { e.preventDefault(); x -= 20; });
    document.getElementById('rightBtn').addEventListener('pointerdown', (e) => { e.preventDefault(); x += 20; });

    draw();
</script>
</body>
</html>
